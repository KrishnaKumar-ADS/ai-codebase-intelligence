name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: codebase_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Create .env
        run: |
          cp .env.example .env
          # In CI we don't need real API keys for unit tests
          # The llm_router tests mock the settings object directly
          echo "GEMINI_API_KEY=test_key" >> .env
          echo "DEEPSEEK_API_KEY=test_key" >> .env
          echo "OPENROUTER_API_KEY=test_key" >> .env
          echo "POSTGRES_DB=codebase_intelligence_test" >> .env

      - name: Run migrations
        run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: codebase_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

      - name: Run unit tests
        run: cd backend && pytest tests/unit/ -v --cov=. --cov-report=xml
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: codebase_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Run Vitest tests (includes graph suites)
        run: npm test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers (backend)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-backend
          key: ${{ runner.os }}-buildx-backend-${{ hashFiles('backend/requirements.runtime.txt', 'docker/Dockerfile.backend', 'docker/Dockerfile.worker') }}
          restore-keys: |
            ${{ runner.os }}-buildx-backend-

      - name: Cache Docker layers (frontend)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-frontend
          key: ${{ runner.os }}-buildx-frontend-${{ hashFiles('frontend/package-lock.json', 'docker/Dockerfile.frontend') }}
          restore-keys: |
            ${{ runner.os }}-buildx-frontend-

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          tags: ai-codebase-intelligence_backend:ci
          cache-from: type=local,src=/tmp/.buildx-cache-backend
          cache-to: type=local,dest=/tmp/.buildx-cache-backend-new,mode=max

      - name: Build worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          tags: ai-codebase-intelligence_worker:ci
          cache-from: type=local,src=/tmp/.buildx-cache-backend
          cache-to: type=local,dest=/tmp/.buildx-cache-backend-new,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: ai-codebase-intelligence_frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=local,src=/tmp/.buildx-cache-frontend
          cache-to: type=local,dest=/tmp/.buildx-cache-frontend-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache-backend
          mv /tmp/.buildx-cache-backend-new /tmp/.buildx-cache-backend || true
          rm -rf /tmp/.buildx-cache-frontend
          mv /tmp/.buildx-cache-frontend-new /tmp/.buildx-cache-frontend || true

  evaluation-smoke:
    name: Evaluation Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run evaluation module unit tests
        run: cd backend && pytest tests/unit/test_evaluation/ -v

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Prepare production env for integration stack
        run: |
          cp .env.prod.example .env.prod
          echo "GEMINI_API_KEY=test_key" >> .env.prod
          echo "OPENROUTER_API_KEY=test_key" >> .env.prod
          echo "DEEPSEEK_API_KEY=test_key" >> .env.prod

      - name: Generate local TLS certificates
        run: bash scripts/gen-certs.sh

      - name: Start production docker stack
        run: docker compose -f docker/docker-compose.prod.yml up -d --build

      - name: Wait for health endpoint
        run: |
          for i in {1..60}; do
            if curl -k -sS https://localhost/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Health endpoint did not become ready in time"
          exit 1

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration/test_docker_stack.py -m integration -v --tb=short
        env:
          INTEGRATION_BASE_URL: https://localhost
          INTEGRATION_VERIFY_SSL: "0"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.prod.yml logs --no-color

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker/docker-compose.prod.yml down -v

  week16-smoke:
    name: Week16 Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run Week 16 smoke checks
        run: bash scripts/smoke-test-week16.sh
