name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: codebase_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Create .env
        run: |
          cp .env.example .env
          # In CI we don't need real API keys for unit tests
          # The llm_router tests mock the settings object directly
          echo "GEMINI_API_KEY=test_key" >> .env
          echo "DEEPSEEK_API_KEY=test_key" >> .env
          echo "OPENROUTER_API_KEY=test_key" >> .env
          echo "POSTGRES_DB=codebase_intelligence_test" >> .env

      - name: Run migrations
        run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: codebase_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

      - name: Run unit tests
        run: cd backend && pytest tests/unit/ -v --cov=. --cov-report=xml
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: codebase_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/